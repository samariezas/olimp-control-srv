<div class="card-name">
    <span class="status-dot"></span>
    <a href="{% url 'ctrl.computer' computer.machine_id %}">{{ computer.name }}</a>
</div>
<div class="card-details">
    {% if computer.last_checkin_uptime %}
    <div class="card-detail">
        <span class="card-label">Up:</span>
        <span class="card-value uptime-value">{{ computer.last_checkin_uptime }}</span>
    </div>
    {% endif %}
    <div class="card-detail">
        <span class="card-label">Ping:</span>
        {% if computer.last_checkin_timestamp %}
        <span class="card-value last-seen" data-ts="{{ computer.last_checkin_timestamp|date:'c' }}"></span>
        {% else %}
        <span class="card-value">—</span>
        {% endif %}
    </div>
    {% if computer.has_in_progress %}
    <div class="card-detail">
        <span class="badge badge-in-progress" style="font-size: 10px;">vykdomas</span>
    </div>
    {% endif %}
</div>
