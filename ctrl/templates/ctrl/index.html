{% extends "ctrl/base.html" %}

{% block title %}Statusas - LMIO CTRL{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Statusas</h1>
</div>
<div class="connection-lost" id="connection-lost">Ryšys nutrūko</div>
<div id="computer-status" class="compact-view">
    {% include "ctrl/partial/index_status_partial.html" %}
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var container = document.getElementById('computer-status');

    var stored = localStorage.getItem('statusView');
    if (stored === 'detailed') container.classList.remove('compact-view');

    function insertToggle() {
        var bar = container.querySelector('.summary-bar');
        if (!bar || bar.querySelector('.view-toggle')) return;
        var btn = document.createElement('button');
        btn.className = 'btn btn-sm view-toggle';
        btn.textContent = container.classList.contains('compact-view') ? 'Detaliau' : 'Kompaktiškai';
        btn.onclick = function() {
            container.classList.toggle('compact-view');
            var isCompact = container.classList.contains('compact-view');
            btn.textContent = isCompact ? 'Detaliau' : 'Kompaktiškai';
            localStorage.setItem('statusView', isCompact ? 'compact' : 'detailed');
        };
        bar.appendChild(btn);
    }

    insertToggle();
    startAutoRefresh('{% url "ctrl.index_status_partial" %}', 'computer-status', 'connection-lost', insertToggle);
})();
</script>
{% endblock %}
